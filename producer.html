<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Producer Availability</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e38;
    --text: #f0eff4;
    --muted: #6e6d7a;
    --accent: #c8f060;
    --accent-dim: rgba(200,240,96,0.12);
    --accent-dim2: rgba(200,240,96,0.05);
    --premium: #f0a060;
    --premium-dim: rgba(240,160,96,0.12);
    --radius: 10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .header {
    width: 100%;
    padding: 1.1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .logo span { color: var(--accent); }
  #header-user {
    display: none;
    align-items: center;
    gap: 0.75rem;
    font-size: 0.82rem;
  }
  #header-name { color: var(--text); font-weight: 600; }
  .premium-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--premium-dim);
    color: var(--premium);
    border: 1px solid rgba(240,160,96,0.3);
    padding: 0.18rem 0.5rem;
    border-radius: 4px;
  }
  .sign-out-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    padding: 0.3rem 0.8rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sign-out-btn:hover { border-color: var(--muted); color: var(--text); }

  .screen {
    width: 100%;
    max-width: 460px;
    padding: 3rem 1.5rem;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1.75rem;
  }
  .screen.active { display: flex; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Login */
  .login-title { text-align: center; }
  .login-title h1 {
    font-size: 1.9rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 0.35rem;
  }
  .login-title p {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 300;
  }
  .login-card {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.75rem;
    display: flex;
    flex-direction: column;
    gap: 1.1rem;
  }
  .field-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 0.45rem;
  }
  select, input[type="password"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    padding: 0.65rem 0.85rem;
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
  }
  select:focus, input:focus { border-color: var(--accent); }
  select option { background: #222228; }

  .login-err {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: #f06060;
    display: none;
    text-align: center;
    padding: 0.45rem;
    background: rgba(240,96,96,0.08);
    border-radius: 6px;
  }
  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #0e0e10;
    font-family: 'Syne', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    border: none;
    border-radius: 7px;
    padding: 0.75rem;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-primary:hover { opacity: 0.87; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Calendar screen */
  #cal-screen {
    max-width: 660px;
    padding: 2rem 1.5rem;
    gap: 1.4rem;
  }
  .cal-header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cal-month-label { font-size: 1.05rem; font-weight: 700; }
  .nav-btns { display: flex; gap: 0.4rem; }
  .nav-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px; height: 32px;
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    transition: border-color 0.15s;
  }
  .nav-btn:hover { border-color: var(--accent); }

  .cal-grid {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .cal-dow {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    padding: 0.35rem 0;
  }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 6px;
    border: 1px solid transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.12s;
    font-size: 0.85rem;
    font-weight: 500;
    gap: 3px;
  }
  .cal-day:hover:not(.empty):not(.past) {
    border-color: var(--border);
    background: var(--surface);
  }
  .cal-day.empty, .cal-day.past { cursor: default; opacity: 0.18; }
  .cal-day.has-slots {
    background: var(--accent-dim2);
    border-color: rgba(200,240,96,0.2);
  }
  .cal-day.selected {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  .cal-day.today .day-num {
    background: var(--accent);
    color: #0e0e10;
    border-radius: 50%;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.78rem;
    font-weight: 700;
  }
  .slot-dots { display: flex; gap: 2px; }
  .slot-dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.7;
  }

  /* Slot panel */
  .slot-panel {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.4rem;
    display: none;
    flex-direction: column;
    gap: 1rem;
  }
  .slot-panel.open { display: flex; }
  .slot-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .slot-date-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .clear-day-btn {
    background: none; border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    cursor: pointer;
    padding: 0.2rem 0.45rem;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .clear-day-btn:hover { color: #f06060; }

  .slot-hint {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 300;
  }
  .slot-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.55rem;
  }
  .slot-opt {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 0.85rem;
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
  }
  .slot-opt:hover { border-color: var(--accent); }
  .slot-opt.checked {
    background: var(--accent-dim);
    border-color: var(--accent);
  }
  .slot-checkbox {
    width: 15px; height: 15px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.12s;
  }
  .slot-opt.checked .slot-checkbox {
    background: var(--accent);
    border-color: var(--accent);
  }
  .slot-opt.checked .slot-checkbox::after {
    content: '';
    width: 7px; height: 4px;
    border-left: 1.5px solid #0e0e10;
    border-bottom: 1.5px solid #0e0e10;
    transform: rotate(-45deg) translateY(-1px);
    display: block;
  }
  .slot-info { display: flex; flex-direction: column; gap: 1px; }
  .slot-name { font-size: 0.85rem; font-weight: 600; }
  .slot-time {
    font-family: 'DM Mono', monospace;
    font-size: 0.67rem;
    color: var(--muted);
    font-weight: 300;
  }
  .slot-actions { display: flex; gap: 0.55rem; }
  .btn-save {
    flex: 1;
    background: var(--accent);
    color: #0e0e10;
    font-family: 'Syne', sans-serif;
    font-size: 0.83rem;
    font-weight: 700;
    border: none;
    border-radius: 7px;
    padding: 0.65rem;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.85; }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-cancel {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.83rem;
    padding: 0.65rem 1.1rem;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cancel:hover { border-color: var(--muted); color: var(--text); }

  .legend {
    display: flex;
    gap: 1.1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 0.35rem; }
  .legend-dot {
    width: 9px; height: 9px;
    border-radius: 2px;
    background: var(--accent-dim2);
    border: 1px solid rgba(200,240,96,0.3);
  }

  .toast {
    position: fixed; bottom: 1.75rem; left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 0.78rem; padding: 0.6rem 1.2rem;
    border-radius: 8px; opacity: 0;
    pointer-events: none; transition: all 0.25s;
    white-space: nowrap; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(200,240,96,0.4); color: var(--accent); }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header class="header">
  <div class="logo">Producer <span>Availability</span></div>
  <div id="header-user">
    <span id="header-name"></span>
    <span id="header-premium" class="premium-badge" style="display:none">★ Premium</span>
    <button class="sign-out-btn" onclick="signOut()">Sign out</button>
  </div>
</header>

<!-- LOGIN -->
<div id="login-screen" class="screen active">
  <div class="login-title">
    <h1>Select your availability</h1>
    <p>Choose your name and enter your PIN to continue</p>
  </div>
  <div class="login-card">
    <div>
      <label class="field-label">Your name</label>
      <select id="name-select"><option value="">Loading…</option></select>
    </div>
    <div>
      <label class="field-label">PIN</label>
      <input type="password" id="pin-in" placeholder="Last 4 digits of your phone" maxlength="10" autocomplete="off">
    </div>
    <div id="login-err" class="login-err">Incorrect PIN. Please try again.</div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Continue →</button>
  </div>
</div>

<!-- CALENDAR -->
<div id="cal-screen" class="screen">
  <div class="cal-header">
    <div class="cal-month-label" id="month-label"></div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot"></div><span>Availability saved</span></div>
  </div>
  <div class="slot-panel" id="slot-panel">
    <div class="slot-panel-header">
      <div class="slot-date-label" id="slot-date-label">—</div>
      <button class="clear-day-btn" onclick="clearDay()">✕ Clear day</button>
    </div>
    <div class="slot-hint">Select all time slots that work for you</div>
    <div class="slot-options">
      <div class="slot-opt" id="opt-allday" onclick="toggleSlot('allday')">
        <div class="slot-checkbox"></div>
        <div class="slot-info"><div class="slot-name">All Day</div><div class="slot-time">Full day available</div></div>
      </div>
      <div class="slot-opt" id="opt-afternoon" onclick="toggleSlot('afternoon')">
        <div class="slot-checkbox"></div>
        <div class="slot-info"><div class="slot-name">Afternoon</div><div class="slot-time">12:00 – 18:00</div></div>
      </div>
      <div class="slot-opt" id="opt-evening" onclick="toggleSlot('evening')">
        <div class="slot-checkbox"></div>
        <div class="slot-info"><div class="slot-name">Evening</div><div class="slot-time">18:00 – 22:00</div></div>
      </div>
      <div class="slot-opt" id="opt-other" onclick="toggleSlot('other')">
        <div class="slot-checkbox"></div>
        <div class="slot-info"><div class="slot-name">Other</div><div class="slot-time">Flexible / TBD</div></div>
      </div>
    </div>
    <div class="slot-actions">
      <button class="btn-cancel" onclick="closeSlotPanel()">Cancel</button>
      <button class="btn-save" id="save-btn" onclick="saveDay()">Save →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://xhaemzuxuztaxczqxkuw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_i449mmgQVOunGAAedwmh3w_bEQWC2yR';

const SB = {
  h: () => ({
    'Content-Type': 'application/json',
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Prefer': 'return=representation'
  }),
  async get(table, qs = '') {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${qs}`, { headers: SB.h() });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async post(table, body) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: 'POST', headers: SB.h(), body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async patch(table, qs, body) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${qs}`, {
      method: 'PATCH', headers: SB.h(), body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async del(table, qs) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${qs}`, {
      method: 'DELETE', headers: { ...SB.h(), 'Prefer': 'return=minimal' }
    });
    if (!r.ok) throw new Error(await r.text());
  }
};

let producer = null, allProducers = [], avCache = {}, selectedDate = null, pendingSlots = new Set();
let viewYear, viewMonth;
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOWS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const SLOT_KEYS = ['allday','afternoon','evening','other'];

window.addEventListener('DOMContentLoaded', async () => {
  const now = new Date();
  viewYear = now.getFullYear();
  viewMonth = now.getMonth();
  await loadProducers();
  const saved = sessionStorage.getItem('prod_id');
  if (saved && allProducers.length) {
    const p = allProducers.find(x => String(x.id) === saved);
    if (p) { producer = p; await enterCalendar(); }
  }
});

async function loadProducers() {
  const sel = document.getElementById('name-select');
  try {
    allProducers = await SB.get('producers', 'order=name&select=id,name,pin,premium');
    sel.innerHTML = '<option value="">— Select your name —</option>' +
      allProducers.map(p => `<option value="${p.id}">${p.name}${p.premium ? ' ★' : ''}</option>`).join('');
  } catch(e) {
    sel.innerHTML = '<option value="">Error loading producers</option>';
  }
}

async function doLogin() {
  const selEl = document.getElementById('name-select');
  const pin = document.getElementById('pin-in').value.trim();
  const err = document.getElementById('login-err');
  err.style.display = 'none';
  if (!selEl.value || !pin) return;
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  const p = allProducers.find(x => String(x.id) === selEl.value);
  if (!p || String(p.pin) !== pin) {
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Continue →'; return;
  }
  producer = p;
  sessionStorage.setItem('prod_id', producer.id);
  await enterCalendar();
  btn.disabled = false; btn.textContent = 'Continue →';
}
document.getElementById('pin-in').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function enterCalendar() {
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('cal-screen').classList.add('active');
  document.getElementById('header-name').textContent = producer.name;
  document.getElementById('header-premium').style.display = producer.premium ? 'inline-block' : 'none';
  document.getElementById('header-user').style.display = 'flex';
  await loadAvailability();
  renderCalendar();
}

async function loadAvailability() {
  avCache = {};
  try {
    const rows = await SB.get('producer_availability', `producer_id=eq.${producer.id}&select=id,date,slots`);
    for (const r of rows) {
      const d = r.date?.split('T')[0];
      if (d) avCache[d] = { rowId: r.id, slots: new Set((r.slots||'').split(',').filter(Boolean)) };
    }
  } catch(e) { console.error(e); }
}

function renderCalendar() {
  const first = new Date(viewYear, viewMonth, 1);
  const last = new Date(viewYear, viewMonth + 1, 0);
  const today = new Date(); today.setHours(0,0,0,0);
  document.getElementById('month-label').textContent = `${MONTHS[viewMonth]} ${viewYear}`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = DOWS.map(d => `<div class="cal-dow">${d}</div>`).join('');
  for (let i = 0; i < first.getDay(); i++) grid.innerHTML += `<div class="cal-day empty"></div>`;
  for (let d = 1; d <= last.getDate(); d++) {
    const date = new Date(viewYear, viewMonth, d);
    const ds = fmtDate(viewYear, viewMonth, d);
    const isPast = date < today, isToday = date.getTime() === today.getTime();
    const hasSlots = avCache[ds]?.slots?.size > 0;
    const isSelected = selectedDate === ds;
    let cls = 'cal-day';
    if (isPast) cls += ' past';
    if (isToday) cls += ' today';
    if (hasSlots) cls += ' has-slots';
    if (isSelected) cls += ' selected';
    const dots = hasSlots ? `<div class="slot-dots">${[...avCache[ds].slots].map(()=>'<div class="slot-dot"></div>').join('')}</div>` : '';
    grid.innerHTML += `<div class="${cls}" onclick="clickDay('${ds}',${isPast})"><div class="day-num">${d}</div>${dots}</div>`;
  }
}

function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  selectedDate = null; closeSlotPanel(); renderCalendar();
}
function fmtDate(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function clickDay(ds, isPast) {
  if (isPast) return;
  selectedDate = ds;
  pendingSlots = avCache[ds] ? new Set(avCache[ds].slots) : new Set();
  openSlotPanel(ds); renderCalendar();
}
function openSlotPanel(ds) {
  const [y,m,d] = ds.split('-').map(Number);
  const label = new Date(y,m-1,d).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('slot-date-label').textContent = label;
  SLOT_KEYS.forEach(k => document.getElementById(`opt-${k}`).classList.toggle('checked', pendingSlots.has(k)));
  document.getElementById('slot-panel').classList.add('open');
  document.getElementById('slot-panel').scrollIntoView({ behavior:'smooth', block:'nearest' });
}
function closeSlotPanel() {
  selectedDate = null; pendingSlots = new Set();
  document.getElementById('slot-panel').classList.remove('open');
  renderCalendar();
}
function toggleSlot(k) {
  pendingSlots.has(k) ? pendingSlots.delete(k) : pendingSlots.add(k);
  SLOT_KEYS.forEach(k2 => document.getElementById(`opt-${k2}`).classList.toggle('checked', pendingSlots.has(k2)));
}

async function saveDay() {
  if (!selectedDate) return;
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '…';
  try {
    const slotsStr = [...pendingSlots].join(',');
    const existing = avCache[selectedDate];
    if (existing) {
      if (pendingSlots.size === 0) {
        await SB.del('producer_availability', `id=eq.${existing.rowId}`);
        delete avCache[selectedDate];
      } else {
        await SB.patch('producer_availability', `id=eq.${existing.rowId}`, { slots: slotsStr, updated_at: new Date().toISOString() });
        avCache[selectedDate].slots = new Set(pendingSlots);
      }
    } else if (pendingSlots.size > 0) {
      const [row] = await SB.post('producer_availability', {
        producer_id: producer.id, producer_name: producer.name,
        date: selectedDate, slots: slotsStr, updated_at: new Date().toISOString()
      });
      avCache[selectedDate] = { rowId: row.id, slots: new Set(pendingSlots) };
    }
    closeSlotPanel(); renderCalendar(); showToast('Saved ✓', true);
  } catch(e) { console.error(e); showToast('Save failed'); }
  btn.disabled = false; btn.textContent = 'Save →';
}

async function clearDay() {
  if (!selectedDate) return;
  pendingSlots = new Set();
  SLOT_KEYS.forEach(k => document.getElementById(`opt-${k}`).classList.remove('checked'));
  const existing = avCache[selectedDate];
  if (existing) {
    try { await SB.del('producer_availability', `id=eq.${existing.rowId}`); delete avCache[selectedDate]; } catch(e) {}
  }
  closeSlotPanel(); renderCalendar(); showToast('Day cleared');
}

function signOut() {
  producer = null; avCache = {}; selectedDate = null;
  sessionStorage.removeItem('prod_id');
  document.getElementById('header-user').style.display = 'none';
  document.getElementById('cal-screen').classList.remove('active');
  document.getElementById('slot-panel').classList.remove('open');
  document.getElementById('login-screen').classList.add('active');
  document.getElementById('pin-in').value = '';
  document.getElementById('name-select').value = '';
  document.getElementById('login-err').style.display = 'none';
}

function showToast(msg, success = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (success ? ' success' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
